name: Create Infrastructure

on:
    workflow_dispatch:

jobs:
    create-azure-resources:
        env:
            REGION: "canadacentral" # You can change this to reflect the region where you deploy your Accelerator
            AZURE_CORE_OUTPUT: "none" # Test

        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Azure Login
              uses: Azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: deploy
              id: createResources
              run: |
                  az deployment sub create \
                    --location ${{ env.REGION }} \
                    --name ${{ github.run_id }} \
                    --template-file ./infra/main.bicep \
                    --parameters ./infra/main.bicepparam \
                    --query 'properties.outputs' \
                    --output json > outputs.json

                  echo "documentIntelligenceEndpoint=$(jq -r '.documentIntelligenceEndpoint.value' outputs.json)" >> $GITHUB_OUTPUT
                  echo "contentUnderstandingEndpoint=$(jq -r '.contentUnderstandingEndpoint.value' outputs.json)" >> $GITHUB_OUTPUT
                  echo "resourceGroupName=$(jq -r '.resourceGroupName.value' outputs.json)" >> $GITHUB_OUTPUT
                  echo "storageTrainingResourceName=$(jq -r '.storageTrainingResourceName.value' outputs.json)" >> $GITHUB_OUTPUT

            - name: Get STORAGE Connection String
              id: getStorageCnxString
              env:
                  GH_TOKEN: ${{ secrets.PAT_TOKEN }}
              run: |
                  CONNECTION_STRING=$(az storage account show-connection-string \
                    --name ${{ steps.createResources.outputs.storageTrainingResourceName }} \
                    --resource-group ${{ steps.createResources.outputs.resourceGroupName }} \
                    --query connectionString \
                    --output tsv)

                  gh secret set STORAGE_CONNECTION_STRING --body "$CONNECTION_STRING" --repo ${{ github.repository }}

            - name: Get STORAGE Account Key
              id: getStorageKey
              env:
                  GH_TOKEN: ${{ secrets.PAT_TOKEN }}
              run: |
                  STORAGE_KEY=$(az storage account keys list \
                    --account-name ${{ steps.createResources.outputs.storageTrainingResourceName }} \
                    --resource-group ${{ steps.createResources.outputs.resourceGroupName }} \
                    --query '[0].value' \
                    --output tsv)

                  gh secret set STORAGE_ACCOUNT_KEY --body "$STORAGE_KEY" --repo ${{ github.repository }}

            - name: Save Document Intelligence Endpoint and API Key
              id: saveDocIntelligence
              env:
                  GH_TOKEN: ${{ secrets.PAT_TOKEN }}
              run: |
                  # Save Document Intelligence Endpoint
                  gh secret set DOCUMENT_INTELLIGENCE_ENDPOINT --body "${{ steps.createResources.outputs.documentIntelligenceEndpoint }}" --repo ${{ github.repository }}

                  # Get and save Document Intelligence API Key
                  DOC_INTEL_KEY=$(az cognitiveservices account keys list \
                    --name $(az cognitiveservices account list \
                      --resource-group ${{ steps.createResources.outputs.resourceGroupName }} \
                      --query "[?kind=='FormRecognizer' || kind=='CognitiveServices'].name | [0]" \
                      --output tsv) \
                    --resource-group ${{ steps.createResources.outputs.resourceGroupName }} \
                    --query 'key1' \
                    --output tsv)

                  gh secret set DOCUMENT_INTELLIGENCE_API_KEY --body "$DOC_INTEL_KEY" --repo ${{ github.repository }}
