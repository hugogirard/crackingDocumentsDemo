services:
  # Document Intelligence API
  document-api:
    build:
      context: ./api/document-api
      dockerfile: Dockerfile
    container_name: document-api
    ports:
      - "8800:8000"
    env_file:
      - ./api/document-api/.env
    restart: unless-stopped
    networks:
      - app-network

  # Valet Key API (Storage SAS token service)
  valet-api:
    build:
      context: ./api/valet-api
      dockerfile: Dockerfile
    container_name: valet-api
    ports:
      - "8000:8000"
    env_file:
      - ./api/valet-api/.env
    restart: unless-stopped
    networks:
      - app-network

  # Web UI (NGINX)
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: document-demo-webui
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - document-api
      - valet-api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
